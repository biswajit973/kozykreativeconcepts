<div class="ticker">
  <div class="ticker-track" id="tickerTrack">
    <span class="ticker-item" *ngFor="let item of items(); trackBy: trackByIndex">
      <span class="name">{{ item.name }}</span>
      <span [class.t-up]="item.up" [class.t-down]="!item.up">{{ item.up ? '▲' : '▼' }} {{ item.val }}</span>
    </span>
  </div>
</div>
