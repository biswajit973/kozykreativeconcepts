<section class="cta-section" id="contact-section">
  <div class="container">
    <div class="cta-box reveal" appHoverSpark sparkIntensity="medium">
      <div class="cta-fx" aria-hidden="true">
        <app-particle-field preset="cta" [interactive]="true"></app-particle-field>
      </div>

      <div class="cta-content">
        <h2>Need Help Deciding What To Build Next?<br>Let’s Talk It Through.</h2>
        <p>Tell us what is not working, what you want to improve, or what you want to launch. We will suggest a realistic next step.</p>


        <div class="cta-contact-info">
          <div class="cta-ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>(+91) 9000500600</div>
          <div class="cta-ci"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M22 6l-10 7L2 6"/></svg>info@kkreative.in</div>
        </div>
      </div>
      <div class="cta-actions">
        <button class="btn btn-pri" appHoverSpark sparkIntensity="high" (click)="ui.openModal('contactModal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          Let's Connect
        </button>
      </div>
    </div>
  </div>
</section>
