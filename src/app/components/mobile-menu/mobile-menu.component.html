<div class="mobile-menu" id="mobileMenu" [class.open]="ui.mobileMenuOpen()">
  <div class="mm-head">
    <span class="logo" style="font-size:1.1rem">
      <div class="logo-mark logo-mark--image" style="width:32px;height:32px">
        <img src="/work-logos/Logo.png" alt="KKREATIVE logo" loading="eager" decoding="async" />
      </div>
      <span class="logo-copy">
        <span class="logo-name">KKREATIVE</span>
        <span class="logo-tagline">inspiring innovations</span>
      </span>
    </span>
    <button class="mm-close" (click)="closeMM()">✕</button>
  </div>
  <ng-container *ngIf="mode === 'home'; else routeModeLinks">
    <button class="mm-link" type="button" style="pointer-events:none;color:var(--c-muted);font-size:.74rem;text-transform:uppercase;letter-spacing:.09em;padding-bottom:.3rem;border:none">
      What We Do
    </button>
    <div class="mm-sub">
      <a routerLink="/services" (click)="closeMM()">Our Services</a>
      <a routerLink="/industries" (click)="closeMM()">Industries</a>
      <a routerLink="/technology" (click)="closeMM()">Technologies</a>
    </div>
    <a routerLink="/who-we-are" (click)="closeMM()">Who We Are</a>
    <a routerLink="/our-work" (click)="closeMM()">Our Work</a>
    <a routerLink="/blogs" (click)="closeMM()">Blogs</a>
    <a routerLink="/careers" (click)="closeMM()">Careers</a>
  </ng-container>
  <ng-template #routeModeLinks>
    <a routerLink="/" (click)="closeMM()">Home</a>
    <button class="mm-link" type="button" style="pointer-events:none;color:var(--c-muted);font-size:.74rem;text-transform:uppercase;letter-spacing:.09em;padding-bottom:.3rem;border:none">
      What We Do
    </button>
    <div class="mm-sub">
      <a routerLink="/services" (click)="closeMM()">Our Services</a>
      <a routerLink="/industries" (click)="closeMM()">Industries</a>
      <a routerLink="/technology" (click)="closeMM()">Technologies</a>
    </div>
    <a routerLink="/who-we-are" (click)="closeMM()">Who We Are</a>
    <a routerLink="/our-work" (click)="closeMM()">Our Work</a>
    <a routerLink="/blogs" (click)="closeMM()">Blogs</a>
    <a routerLink="/careers" (click)="closeMM()">Careers</a>
  </ng-template>
  <button type="button" class="mm-link" (click)="openModalFromMenu('contactModal')">Let's Connect</button>
  <a *ngIf="mode === 'home'" routerLink="/" fragment="contact-section" (click)="closeMM()">Contact Us</a>
  <button *ngIf="mode !== 'home'" type="button" class="mm-link" (click)="openModalFromMenu('contactModal')">Contact Us</button>
</div>
