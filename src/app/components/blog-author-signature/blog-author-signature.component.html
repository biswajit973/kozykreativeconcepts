<section class="blog-author-signature" role="note" [attr.aria-label]="ariaLabel">
  <div class="signature-top">
    <span class="pen-chip" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 20l4.2-1 10-10a2.2 2.2 0 0 0-3.1-3.1l-10 10L4 20Z"></path>
        <path d="M13.2 5.9l4.9 4.9"></path>
      </svg>
    </span>
    <p class="signature-author">{{ authorName }}</p>
  </div>

  <p class="signature-tagline">{{ authorTagline }}</p>

  <div class="signature-brand">
    <span class="logo-mark signature-logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <path
          d="M6 18L12 6L18 18"
          stroke="#fff"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round">
        </path>
      </svg>
    </span>
    <span class="brand-text">{{ brandText }}</span>
  </div>
</section>
