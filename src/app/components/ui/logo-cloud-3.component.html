<div
  class="logo-cloud-3"
  aria-label="Top technology company logos moving in a continuous loop">
  <div class="logo-cloud-glow" aria-hidden="true"></div>

  <app-infinite-slider
    [items]="logos"
    [gap]="42"
    [speed]="80"
    [reverse]="true"
    [pauseOnHover]="true"
    [pauseOnTouch]="true">
  </app-infinite-slider>
</div>
