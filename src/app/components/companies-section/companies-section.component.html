<section class="founders" id="founders">
  <div class="container">
    <div class="sec-head reveal">
      <div class="overline" style="justify-content:center">Our Works</div>
      <h2>Businesses and teams we have supported over the years.</h2>
      <p>Our work has covered different industries, operating styles, and delivery needs.</p>
    </div>

    <p class="leaders-context reveal d1">
      A moving view of selected work marks from businesses and teams we have supported.
    </p>

    <div class="works-logo-board-wrap reveal d2">
      <div class="works-logo-fx" aria-hidden="true">
        <app-particle-field preset="works" [interactive]="true"></app-particle-field>
      </div>

      <div class="works-logo-board">
        <div class="logo-marquee">
          <div class="logo-track">
            <article class="work-logo-item" aria-hidden="true" *ngFor="let item of rowOneLoop; trackBy: trackLogo">
              <img class="work-logo-image" [src]="item.src" alt="" loading="lazy" decoding="async" />
            </article>
          </div>
        </div>

        <div class="logo-marquee logo-marquee--reverse">
          <div class="logo-track">
            <article class="work-logo-item" aria-hidden="true" *ngFor="let item of rowTwoLoop; trackBy: trackLogo">
              <img class="work-logo-image" [src]="item.src" alt="" loading="lazy" decoding="async" />
            </article>
          </div>
        </div>
      </div>
    </div>

    <div class="works-actions reveal d3">
      <a routerLink="/our-work" class="btn btn-sm btn-out">Explore Our Work In Detail</a>
    </div>
  </div>
</section>
