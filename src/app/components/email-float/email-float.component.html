<div class="email-float" [class.open]="isOpen()">
  <div class="email-popover" *ngIf="isOpen()">
    <a
      *ngFor="let item of emails"
      class="email-option"
      [href]="item.href"
      (click)="closeMenu()">
      {{ item.label }}
    </a>
  </div>

  <button
    type="button"
    class="email-trigger"
    (click)="toggleMenu($event)"
    aria-label="Open quick email options">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="5" width="18" height="14" rx="2"></rect>
      <path d="M3 7l9 7 9-7"></path>
    </svg>
  </button>
</div>
