<nav class="nav" id="navbar" [class.scrolled]="ui.navbarScrolled()">
  <div class="container nav-inner">
    <a href="#" class="logo" (click)="onLogoClick($event)">
      <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M6 18L12 6L18 18" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      KKREATIVE
    </a>
    <ul class="nav-links">
      <ng-container *ngIf="mode === 'home'; else routeLinks">
        <li id="whatWeDoMenu">
          <button type="button" [class.open]="whatWeDoOpen" (click)="toggleWhatWeDo($event)">
            What We Do
            <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </button>
          <div class="drop" [class.active]="whatWeDoOpen">
            <a routerLink="/services" (click)="onRouteNav()">Our Services</a>
            <a routerLink="/industries" (click)="onRouteNav()">Industries</a>
            <a routerLink="/technology" (click)="onRouteNav()">Technologies</a>
          </div>
        </li>
        <li><a routerLink="/who-we-are" (click)="onRouteNav()">Who We Are</a></li>
        <li><a routerLink="/our-work" (click)="onRouteNav()">Our Work</a></li>
        <li><a routerLink="/blogs" (click)="onRouteNav()">Blogs</a></li>
        <li><a routerLink="/careers" (click)="onRouteNav()">Careers</a></li>
      </ng-container>
      <ng-template #routeLinks>
        <li><a routerLink="/" (click)="onRouteNav()">Home</a></li>
        <li id="whatWeDoMenu">
          <button type="button" [class.open]="whatWeDoOpen" (click)="toggleWhatWeDo($event)">
            What We Do
            <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </button>
          <div class="drop" [class.active]="whatWeDoOpen">
            <a routerLink="/services" (click)="onRouteNav()">Our Services</a>
            <a routerLink="/industries" (click)="onRouteNav()">Industries</a>
            <a routerLink="/technology" (click)="onRouteNav()">Technologies</a>
          </div>
        </li>
        <li><a routerLink="/who-we-are" (click)="onRouteNav()">Who We Are</a></li>
        <li><a routerLink="/our-work" (click)="onRouteNav()">Our Work</a></li>
        <li><a routerLink="/blogs" (click)="onRouteNav()">Blogs</a></li>
        <li><a routerLink="/careers" (click)="onRouteNav()">Careers</a></li>
      </ng-template>
      <li>
        <a *ngIf="mode === 'home'" href="#contact-section">Contact</a>
        <a *ngIf="mode !== 'home'" href="#" (click)="onDropAction($event, 'contactModal')">Contact</a>
      </li>
    </ul>
    <div class="nav-cta">
      <button
        type="button"
        class="theme-toggle"
        (click)="onThemeToggle()"
        [attr.aria-label]="ui.isDarkMode() ? 'Switch to light mode' : 'Switch to OLED black mode'">
        <svg *ngIf="!ui.isDarkMode()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
        </svg>
        <svg *ngIf="ui.isDarkMode()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3c0.38 0 0.76 0.03 1.13 0.08a7 7 0 0 0 8.58 9.71c0.05 0.33 0.08 0.66 0.08 1z"></path>
        </svg>
      </button>
      <button class="btn btn-sm btn-pri" type="button" (click)="ui.openModal('contactModal')">Let's Connect</button>
    </div>
    <button class="hamburger" (click)="onOpenMobileMenu()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
  </div>
</nav>
