<div class="modal-overlay" id="contactModal" [class.open]="ui.isModalOpen('contactModal')" (click)="onOverlayClick($event)">
  <div class="modal contact-modal">
    <button class="modal-close" (click)="close()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    <div class="modal-body">
      <h2>Let's Connect</h2>
      <p class="modal-sub">Our advisor will reach out within 24 hours. Your journey to financial freedom starts with one conversation.</p>
      <form (submit)="onSubmit($event)">
        <div class="form-row">
          <div class="form-group"><label>Full Name</label><input type="text" class="form-input" placeholder="Your name" required></div>
          <div class="form-group"><label>Email</label><input type="email" class="form-input" placeholder="you@email.com" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Phone</label><input type="tel" class="form-input" placeholder="(+91) 8072871049" required></div>
          <div class="form-group"><label>Service</label><select class="form-select" required><option value="" disabled selected>Choose a service</option><option>Mutual Funds</option><option>Fixed Deposits</option><option>Bonds</option><option>Term Insurance</option><option>Health Insurance</option><option>Vehicle Insurance</option><option>NPS</option><option>Other</option></select></div>
        </div>
        <div class="form-group"><label>Tell us about your goals</label><textarea class="form-textarea" placeholder="What does financial success look like for you?"></textarea></div>
        <button type="submit" class="btn btn-pri" style="width:100%;margin-top:.25rem">Submit Request</button>
      </form>
    </div>
  </div>
</div>
