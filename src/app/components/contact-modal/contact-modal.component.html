<div class="modal-overlay" id="contactModal" [class.open]="ui.isModalOpen('contactModal')" (click)="onOverlayClick($event)">
  <div class="modal contact-modal">
    <button class="modal-close" (click)="close()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    <div class="modal-body">
      <h2>Let's Connect</h2>
      <p class="modal-sub">Share your business need. Our team will contact you within 24 hours with a clear and practical roadmap.</p>
      <form (submit)="onSubmit($event)">
        <div class="form-row">
          <div class="form-group"><label>Full Name</label><input type="text" class="form-input" placeholder="Your name" required></div>
          <div class="form-group"><label>Email</label><input type="email" class="form-input" placeholder="you@email.com" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Phone</label><input type="tel" class="form-input" placeholder="(+91) 9000500600" required></div>
          <div class="form-group"><label>Service</label><select class="form-select" required><option value="" disabled selected>Choose a service</option><option>App Development</option><option>Web Development</option><option>Chatbots and Automation</option><option>Cloud and DevOps</option><option>QA Testing and Cybersecurity</option><option>Digital Marketing</option><option>Business Consulting and Digitalisation</option><option>Software Trainings</option><option>Other</option></select></div>
        </div>
        <div class="form-group"><label>Tell us about your requirement</label><textarea class="form-textarea" placeholder="What business problem do you want to solve?"></textarea></div>
        <button type="submit" class="btn btn-pri" style="width:100%;margin-top:.25rem">Submit Request</button>
      </form>
    </div>
  </div>
</div>
