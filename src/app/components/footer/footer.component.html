<footer class="contact-footer">
  <div class="container">
    <section class="footer-merged" aria-label="Contact and office location">
      <div class="footer-columns">
        <article class="footer-column footer-column--address">
          <h3 class="column-title">Email & Address</h3>
          <div>
            <span class="footer-label">Email</span>
            <a class="footer-value" href="mailto:Info@kreative.in">Info@kreative.in</a>
            <a class="footer-value" href="mailto:Hr@kkreative.in">Hr@kkreative.in</a>
          </div>

          <div>
            <span class="footer-label">Address</span>
            <span class="footer-value">
              KKREATIVE CONCEPTS PRIVATE LIMITED<br>
              White House, 1st & 2nd Floors,<br>
              Khairatabad, Hyderabad
            </span>
          </div>
        </article>

        <article class="footer-column footer-column--meta">
          <h3 class="column-title">Phone & Hours</h3>
          <div>
            <span class="footer-label">Phone</span>
            <a class="footer-value" href="tel:+919000500600">+91 9000500600</a>
          </div>

          <div>
            <span class="footer-label">Hours</span>
            <strong class="footer-value">Mon-Sat, 10:00 AM to 6:00 PM</strong>
          </div>
        </article>

        <article class="footer-column footer-column--links">
          <h3 class="column-title">Quick Links</h3>
          <nav class="footer-links-nav" aria-label="Footer navigation">
            <a
              class="footer-link"
              *ngFor="let item of quickLinks"
              [routerLink]="item.to">
              {{ item.label }}
            </a>
          </nav>
        </article>

        <article class="footer-column footer-column--map">
          <h3 class="column-title">Office Map</h3>

          <div class="map-frame">
            <iframe
              [src]="mapsEmbedSafeUrl"
              loading="lazy"
              title="KKREATIVE Hyderabad office map"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>

          <a
            class="map-link"
            [href]="mapsUrl"
            target="_blank"
            rel="noopener noreferrer">
            Open in Google Maps
          </a>
        </article>
      </div>
    </section>
  </div>
</footer>
