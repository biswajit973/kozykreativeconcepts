<footer class="contact-footer">
  <div class="container">
    <section class="footer-minimal" aria-label="Footer">
      <article class="footer-block footer-block--brand">
        <span class="footer-kicker">Company</span>
        <p class="footer-title">Kozy Kreative Concepts Private Limited</p>
        <div class="footer-list">
          <span class="footer-text">White House, 1st &amp; 2nd Floors, Khairatabad, Hyderabad</span>
          <span class="footer-text">Since {{ foundingYear }} · {{ yearsOfExperience }} years of expertise</span>
        </div>
      </article>

      <article class="footer-block footer-block--contact">
        <span class="footer-kicker">Contact</span>
        <div class="footer-list">
          <a class="footer-link footer-link--strong" href="tel:+919000500600">+91 9000500600</a>
          <a class="footer-link" href="mailto:info@kkreative.in">info@kkreative.in</a>
          <a class="footer-link" href="mailto:hr@kkreative.in">hr@kkreative.in</a>
        </div>
      </article>

      <article class="footer-block footer-block--links">
        <nav class="footer-links-nav" aria-label="Footer navigation">
          <a
            class="footer-link"
            *ngFor="let item of quickLinks"
            [routerLink]="item.to"
            [fragment]="item.fragment ?? null">
            {{ item.label }}
          </a>
        </nav>
        <div class="footer-list footer-list--meta">
          <span class="footer-text">Mon-Sat, 10:00 AM to 6:00 PM</span>
          <a class="footer-link" [href]="linkedinUrl" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        </div>
      </article>
    </section>
  </div>
</footer>
